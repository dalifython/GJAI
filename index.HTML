                        text: `최신 수정 내용은 유지하되, 전체 코드 구조를 단순화하고 중복 코드를 제거하는 리팩토링을 해줘.`
                    },

                    },
                    {

                        text: `(어느 버튼/화면)이 (어떻게) 안 돼. 눌렀을 때 (원하는 동작)이 되도록 연결을 확인해서 고쳐줘.`
                    },
                    {
                        step: '템플릿',
                        title: '4. 되돌리기',
                        badge: '그대로 복사',
                        badgeColor: 'bg-purple-100 text-purple-700',
                        text: `방금 바꾼 내용 때문에 이상해졌어. 취소하고 직전의 잘 되던 상태로 되돌려 줘.`
                    }
                ]
            }
        ];

        let activeTabId = promptData[0].id;

        // Render functions
        function renderTabs() {
            const nav = document.getElementById('tab-nav');
            nav.innerHTML = promptData.map(tab => `
                <button 
                    onclick="switchTab('${tab.id}')"
                    class="whitespace-nowrap px-4 py-2.5 rounded-full text-sm font-semibold transition-all duration-200 ease-in-out border 
                    ${activeTabId === tab.id 
                        ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' 
                        : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}"
                >
                    ${tab.title}
                </button>
            `).join('');
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            const activeData = promptData.find(t => t.id === activeTabId);

            contentArea.innerHTML = activeData.prompts.map((prompt, index) => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-5">
                    <!-- Header -->
                    <div class="bg-gray-50 border-b border-gray-100 px-4 py-3 flex justify-between items-start gap-4">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-black text-gray-400 text-sm">${prompt.step}</span>
                                <span class="px-2 py-0.5 rounded-md text-[11px] font-bold tracking-wide ${prompt.badgeColor}">${prompt.badge}</span>
                            </div>
                            <h3 class="font-bold text-gray-900 text-lg">${prompt.title}</h3>
                        </div>
                        <button onclick="copyText('prompt-text-${index}')" class="flex-shrink-0 flex items-center justify-center gap-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg text-sm font-bold transition-colors active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                            </svg>
                            복사
                        </button>
                    </div>
                    <!-- Body -->
                    <div class="p-4 bg-[#f8f9fa] relative group">
                        <textarea id="prompt-text-${index}" readonly class="w-full bg-transparent text-gray-700 text-[15px] leading-relaxed font-mono resize-none outline-none overflow-hidden" style="min-height: 100px; height: auto;" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'">${prompt.text}</textarea>
                    </div>
                </div>
            `).join('');

            // Adjust textarea heights after render
            setTimeout(() => {
                const textareas = contentArea.querySelectorAll('textarea');
                textareas.forEach(ta => {
                    ta.style.height = ta.scrollHeight + 'px';
                });
            }, 10);
        }

        // Logic functions
        window.switchTab = (id) => {
            activeTabId = id;
            renderTabs();
            renderContent();
        };

        window.copyText = (elementId) => {
            const textArea = document.getElementById(elementId);
            const text = textArea.value;
            
            // Clipboard fallback logic for robust copying (especially in IFrames/embedded environments)
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = text;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Fallback copy failed', err);
                alert("복사에 실패했습니다. 직접 드래그해서 복사해주세요.");
            }
            
            document.body.removeChild(tempTextArea);
        };

        let toastTimeout;
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Initialize
        renderTabs();
        renderContent();
    </script>
</body>
